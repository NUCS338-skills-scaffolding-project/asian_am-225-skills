<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Console</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: #e2e0d8;
    --border-strong: #c8c6bc;
    --text: #1a1a18;
    --text-muted: #6b6a66;
    --text-faint: #a09f9a;
    --blue-bg: #e6f1fb; --blue-text: #0c447c;
    --green-bg: #eaf3de; --green-text: #27500a;
    --purple-bg: #eeedfe; --purple-text: #3c3489;
    --red-bg: #fcebeb; --red-text: #791f1f;
    --teal-bg: #e1f5ee; --teal-text: #085041;
    --radius: 8px; --radius-lg: 12px;
    --mono: 'Courier New', Courier, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --border: #38373280;
      --border-strong: #555450;
      --text: #f0ede6;
      --text-muted: #a09f9a;
      --text-faint: #6b6a66;
      --blue-bg: #042c53; --blue-text: #b5d4f4;
      --green-bg: #173404; --green-text: #c0dd97;
      --purple-bg: #26215c; --purple-text: #cecbf6;
      --red-bg: #501313; --red-text: #f7c1c1;
      --teal-bg: #04342c; --teal-text: #9fe1cb;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .shell {
    width: 100%;
    max-width: 780px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-faint);
  }

  .dot.active { background: #639922; animation: blink 1.2s infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }

  .header-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-muted);
  }

  /* skills */
  .skills-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .skill-chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: 0.15s;
    user-select: none;
  }

  .skill-chip:hover {
    border-color: var(--border-strong);
  }

  .skill-chip.lit {
    background: var(--green-bg);
    color: var(--green-text);
    border-color: var(--green-text);
  }

  /* input */
  .input-row {
    display: flex;
    gap: 8px;
  }

  input {
    flex: 1;
    height: 40px;
    padding: 0 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    outline: none;
  }

  button {
    padding: 0 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.5;
  }

  /* log */
  .log {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .log-header {
    padding: 10px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .log-body {
    min-height: 300px;
    max-height: 500px;
    overflow-y: auto;
    padding: 12px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .empty {
    color: var(--text-faint);
    text-align: center;
    margin-top: 40px;
  }

  /* entries */
  .entry { display: flex; flex-direction: column; gap: 4px; }

  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 999px;
    align-self: flex-start;
  }

  .badge.user    { background: var(--blue-bg);   color: var(--blue-text); }
  .badge.agent   { background: var(--purple-bg); color: var(--purple-text); }
  .badge.skill   { background: var(--green-bg);  color: var(--green-text); }
  .badge.error   { background: var(--red-bg);    color: var(--red-text); }
  .badge.done    { background: var(--teal-bg);   color: var(--teal-text); }

  .entry-body {
    padding: 8px 10px;
    border-radius: var(--radius);
    background: var(--bg);
    border-left: 3px solid var(--border);
    white-space: pre-wrap;
    line-height: 1.5;
  }

  .entry-body.user  { border-color: var(--blue-text); }
  .entry-body.agent { border-color: var(--purple-text); }
  .entry-body.error { border-color: var(--red-text); }
  .entry-body.done  { border-color: var(--teal-text); }
</style>
</head>

<body>
<div class="shell">

  <div class="header">
    <div class="dot" id="dot"></div>
    <div class="header-title">Agent console</div>
  </div>

  <!-- skills -->
  <div>
    <div style="font-size:11px; color:var(--text-faint); margin-bottom:6px;">Skills</div>
    <div class="skills-row" id="skills-row">Loading...</div>
  </div>

  <div style="font-size:11px; color:var(--text-faint); margin-bottom:6px;">
    Active skill: <span id="active-skill">none</span>
  </div>  

  <!-- input -->
  <div class="input-row">
    <input id="claim" placeholder="Enter your request..." />
    <button id="run-btn" onclick="runAgent()">Run</button>
  </div>

  <!-- log -->
  <div class="log">
    <div class="log-header">
      <span>Conversation</span>
      <button onclick="clearLog()">Clear</button>
    </div>
    <div class="log-body" id="log"></div>
  </div>

</div>

<script>
let selectedSkill = null;
let running = false;
let history = [];   // persists across turns
let entries = [];   // display entries

function esc(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function add(type, label, body) {
  entries.push({ type, label, body });
  render();
  // auto-scroll to bottom
  const log = document.getElementById("log");
  log.scrollTop = log.scrollHeight;
}

function render() {
  const el = document.getElementById("log");
  if (!entries.length) {
    el.innerHTML = `<div class="empty">No logs yet</div>`;
    return;
  }

  el.innerHTML = entries.map(e => `
    <div class="entry">
      <span class="badge ${e.type}">${esc(e.label)}</span>
      <div class="entry-body ${e.type}">${esc(e.body)}</div>
    </div>
  `).join("");
}

function clearLog() {
  entries = [];
  history = [];   // reset conversation history too
  render();
}

function setRunning(v) {
  running = v;
  document.getElementById("dot").classList.toggle("active", v);
  document.getElementById("run-btn").disabled = v;
}

function selectSkill(name) {
  selectedSkill = name;
  document.querySelectorAll(".skill-chip").forEach(c => {
    c.classList.toggle("lit", c.dataset.name === name);
  });
}

async function loadSkills() {
  try {
    const res = await fetch("/skills");
    const data = await res.json();

    const row = document.getElementById("skills-row");

    // add AUTO manually at the front
    const allSkills = [
      { name: "auto" },
      ...data.skills
    ];

    row.innerHTML = allSkills.map(s => `
      <div class="skill-chip"
           data-name="${esc(s.name)}"
           onclick="selectSkill('${esc(s.name)}')">
        ${esc(s.name)}
      </div>
    `).join("");

    selectSkill("auto"); // default to auto
  } catch (err) {
    document.getElementById("skills-row").textContent = "Failed to load skills";
  }
}

async function runAgent() {
  const input = document.getElementById("claim").value.trim();
  if (!input || running) return;

  if (!selectedSkill) {
    add("error", "error", "Select a skill first");
    return;
  }

  setRunning(true);
  add("user", "user", input);

  try {
    const res = await fetch("/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        input,
        skill: selectedSkill,
        history          // send current history to server
      })
    });

    const data = await res.json();

    if (data.error) {
      add("error", "error", data.error);
    } else {
      history = data.history;          // update local history from server response
      add("agent", "agent", data.result);  // show only the latest assistant reply
      document.getElementById("active-skill").textContent = data.skill_used || selectedSkill;
    }
  } catch (err) {
    add("error", "error", "Network error: " + err.message);
  }

  setRunning(false);
  document.getElementById("claim").value = "";
}

document.getElementById("claim").addEventListener("keydown", e => {
  if (e.key === "Enter") runAgent();
});

loadSkills();
</script>

</body>
</html>
